<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Textus Account Sign In</title>
  <link href="/web/assets/bootstrap.min.css" rel="stylesheet">
  <link href="/web/assets/textus-widgets.css" rel="stylesheet">
</head>
<body class="bg-light" data-textus-page="signin">
  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-md-7 col-lg-5">
        <div class="card shadow-sm">
          <div class="card-body p-4">
            <p class="text-uppercase text-muted small mb-2">Textus User Account</p>
            <h1 class="h3 mb-3" data-textus-role="heading">Sign in</h1>
            <p class="text-secondary" data-textus-role="subtitle">Use your login name or email to continue to the application.</p>
            <div id="login-error" class="alert alert-danger d-none" role="alert"></div>
            <form id="login-form" method="post">
              <div class="mb-3" data-textus-field="username">
                <label class="form-label" for="username">Login name or Email</label>
                <input class="form-control" id="username" name="username" autocomplete="username" required>
                <div class="form-text">Use the login name or email registered for your Textus account.</div>
              </div>
              <div class="mb-3" data-textus-field="password">
                <label class="form-label" for="password">Password</label>
                <input class="form-control" id="password" name="password" type="password" autocomplete="current-password" required>
                <div class="form-text">Use the password registered for your Textus account.</div>
              </div>
              <input id="return-to" type="hidden" name="returnTo">
              <div class="d-grid gap-2">
                <button class="btn btn-primary" type="submit" data-textus-role="submit">Sign in</button>
                <a id="signup-link" class="btn btn-outline-secondary" href="#">Create account</a>
                <a id="reset-link" class="btn btn-link" href="#">Forgot password?</a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script>
    (function() {
      const params = new URLSearchParams(window.location.search);
      const returnTo = params.get("returnTo") || "/web/cwitter";
      const pathname = window.location.pathname;
      const signupPath = pathname.endsWith("/signin") ? pathname.replace(/\/signin$/, "/signup") : pathname.replace(/\/login$/, "/signup");
      const resetPath = pathname.endsWith("/signin") ? pathname.replace(/\/signin$/, "/password-reset") : "/web/textus-user-account/password-reset";
      const challengePath = pathname.endsWith("/signin") ? pathname.replace(/\/signin$/, "/two-factor/challenge") : "/web/textus-user-account/two-factor/challenge";
      const error = params.get("error");
      const form = document.getElementById("login-form");
      const box = document.getElementById("login-error");
      document.getElementById("return-to").value = returnTo;
      document.getElementById("signup-link").setAttribute("href", signupPath + "?returnTo=" + encodeURIComponent(returnTo));
      document.getElementById("reset-link").setAttribute("href", resetPath + "?returnTo=" + encodeURIComponent(returnTo));

      function normalizedSegment(value) {
        return (value || "textus-user-account")
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, "-")
          .replace(/^-+|-+$/g, "") || "textus-user-account";
      }

      function sessionCookieName(targetPath) {
        const match = (targetPath || "").match(/^\/web\/([^/?#]+)/);
        return "textus-session-" + normalizedSegment(match ? match[1] : "textus-user-account");
      }

      function setSessionCookie(sessionId, targetPath) {
        document.cookie = sessionCookieName(targetPath) + "=" + encodeURIComponent(sessionId) + "; Path=/; SameSite=Lax";
      }

      if (error) {
        box.textContent = error;
        box.classList.remove("d-none");
      }

      function isJobId(value) {
        return /^cncf-job-job-/.test((value || "").trim());
      }

      async function awaitJobResult(jobId) {
        const body = new URLSearchParams();
        body.set("id", jobId);
        const response = await fetch("/rest/v1/job_control/job/await_job_result", {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          credentials: "omit",
          body
        });
        const text = await response.text();
        return { response, text };
      }

      function parsePayload(text) {
        try {
          return text ? JSON.parse(text) : {};
        } catch (_) {
          return {};
        }
      }

      function challengeIdOf(payload) {
        return payload.challengeId || payload.challenge_id || "";
      }

      function accessSessionIdOf(payload) {
        return payload.accessSessionId || payload.access_session_id || "";
      }


      function structuredErrorMessage(text, status, fallback) {
        try {
          const payload = text ? JSON.parse(text) : {};
          const error = payload && payload.error ? payload.error : null;
          if (error && error.message) {
            const code = error.detailCode || error.code || "";
            return code ? error.message + " (" + code + ")" : error.message;
          }
        } catch (_) {}
        return text || fallback || ("Request failed (" + status + ").");
      }
      form.addEventListener("submit", async function(event) {
        event.preventDefault();
        box.classList.add("d-none");
        box.textContent = "";
        const body = new URLSearchParams();
        body.set("identifier", document.getElementById("username").value);
        body.set("password", document.getElementById("password").value);
        try {
          const response = await fetch("/form-api/user-account/user/login", {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            credentials: "omit",
            body
          });
          let text = await response.text();
          let effectiveResponse = response;
          if (response.ok && isJobId(text)) {
            const awaited = await awaitJobResult(text.trim());
            effectiveResponse = awaited.response;
            text = awaited.text;
          }
          const payload = parsePayload(text);
          if (!effectiveResponse.ok) {
            box.textContent = structuredErrorMessage(text, effectiveResponse.status, "Sign-in failed (" + effectiveResponse.status + ").");
            box.classList.remove("d-none");
            return;
          }
          if (payload.twoFactorRequired && challengeIdOf(payload)) {
            const url = new URL(challengePath, window.location.origin);
            url.searchParams.set("challengeId", challengeIdOf(payload));
            url.searchParams.set("returnTo", returnTo);
            window.location.href = url.pathname + url.search;
            return;
          }
          if (accessSessionIdOf(payload)) {
            setSessionCookie(accessSessionIdOf(payload), returnTo);
            window.location.href = returnTo;
            return;
          }
          box.textContent = "Sign-in did not return a session.";
          box.classList.remove("d-none");
        } catch (_) {
          box.textContent = "Unable to reach the account service. Restart the local server and try again.";
          box.classList.remove("d-none");
        }
      });
    })();
  </script>
</body>
</html>
