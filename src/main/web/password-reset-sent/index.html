<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Password Reset Requested</title>
  <link href="/web/assets/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <main class="container py-5"><div class="row justify-content-center"><div class="col-12 col-md-7 col-lg-5"><div class="card shadow-sm"><div class="card-body p-4">
    <p class="text-uppercase text-muted small mb-2">Textus User Account</p>
    <h1 class="h3 mb-3">Check your email</h1>
    <p class="text-secondary">If the account exists and is usable, a reset link has been issued.</p>
    <div class="d-grid gap-2">
      <a id="signin-link" class="btn btn-primary" href="#">Back to sign in</a>
    </div>
  </div></div></div></div></main>
  <script>
    (function() {
      const params = new URLSearchParams(window.location.search);
      const returnTo = params.get('returnTo') || '/web/cwitter';
      document.getElementById('signin-link').href = '/web/textus-user-account/signin?returnTo=' + encodeURIComponent(returnTo);
    })();
  </script>
</body>
</html>
