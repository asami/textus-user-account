defaultView: summary
expose:
  textus-user-account.user.register: public
  textus-user-account.user.login: public
  textus-user-account.user.request-password-reset: public
  textus-user-account.user.confirm-password-reset: public
  textus-user-account.user.verify-two-factor-login: public
  textus-user-account.user.enroll-two-factor: protected

form:
  textus-user-account.user.register:
    enabled: true
  textus-user-account.user.login:
    enabled: true
  textus-user-account.user.request-password-reset:
    enabled: true
  textus-user-account.user.confirm-password-reset:
    enabled: true
  textus-user-account.user.verify-two-factor-login:
    enabled: true
  textus-user-account.user.enroll-two-factor:
    enabled: true

apps:
  - name: signin
    kind: static-form
    path: /web/textus-user-account/signin
    root: /web/signin
    route: /web/textus-user-account/signin
  - name: signup
    kind: static-form
    path: /web/textus-user-account/signup
    root: /web/signup
    route: /web/textus-user-account/signup
  - name: password-reset
    kind: static-form
    path: /web/textus-user-account/password-reset
    root: /web/password-reset
    route: /web/textus-user-account/password-reset
  - name: password-reset-sent
    kind: static-form
    path: /web/textus-user-account/password-reset/sent
    root: /web/password-reset-sent
    route: /web/textus-user-account/password-reset/sent
  - name: password-reset-confirm
    kind: static-form
    path: /web/textus-user-account/password-reset/confirm
    root: /web/password-reset-confirm
    route: /web/textus-user-account/password-reset/confirm
  - name: password-reset-success
    kind: static-form
    path: /web/textus-user-account/password-reset/success
    root: /web/password-reset-success
    route: /web/textus-user-account/password-reset/success
  - name: two-factor
    kind: static-form
    path: /web/textus-user-account/two-factor
    root: /web/two-factor
    route: /web/textus-user-account/two-factor
  - name: two-factor-challenge
    kind: static-form
    path: /web/textus-user-account/two-factor/challenge
    root: /web/two-factor-challenge
    route: /web/textus-user-account/two-factor/challenge
